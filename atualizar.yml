name: .github/workflows/atualizar.yml

on:
  schedule:
    # Roda de segunda a sexta às 18h (horário de Brasília = 21h UTC)
    - cron: '0 21 * * 1-5'
  workflow_dispatch: # permite rodar manualmente pelo GitHub

jobs:
  gerar-painel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Rodar script e gerar HTML
        run: python buscar_dados_bcb.py

      - name: Commit e push do HTML atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add painel_dolar_bcb.html
          git diff --cached --quiet || git commit -m "Painel atualizado: $(date -u '+%d/%m/%Y %H:%M') UTC"
          git push
